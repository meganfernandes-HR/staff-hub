<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Subko Hub" />
  <meta name="theme-color" content="#1c2b1e" />
  <title>Subko Staff Hub</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- PIN SCREEN -->
  <div id="pin-screen" class="pin-screen">
    <div class="pin-inner">
      <div class="pin-logo">
        <div class="pin-wordmark">Subko</div>
        <div class="pin-sub">Staff Hub</div>
      </div>
      <div class="pin-prompt">Enter PIN to continue</div>
      <div class="pin-dots">
        <span class="dot" id="d0"></span>
        <span class="dot" id="d1"></span>
        <span class="dot" id="d2"></span>
        <span class="dot" id="d3"></span>
      </div>
      <div class="pin-error" id="pin-error">Incorrect PIN</div>
      <div class="pin-pad">
        <button class="pin-key" data-val="1">1</button>
        <button class="pin-key" data-val="2">2</button>
        <button class="pin-key" data-val="3">3</button>
        <button class="pin-key" data-val="4">4</button>
        <button class="pin-key" data-val="5">5</button>
        <button class="pin-key" data-val="6">6</button>
        <button class="pin-key" data-val="7">7</button>
        <button class="pin-key" data-val="8">8</button>
        <button class="pin-key" data-val="9">9</button>
        <button class="pin-key pin-key--blank"></button>
        <button class="pin-key" data-val="0">0</button>
        <button class="pin-key pin-key--del" id="pin-del">⌫</button>
      </div>
    </div>
  </div>

  <!-- LOADING SCREEN -->
  <div id="loading-screen" class="loading-screen hidden">
    <div class="loading-inner">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading staff data…</div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="app hidden">

    <header class="topbar">
      <button class="topbar-back hidden" id="back-btn" onclick="goBack()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7 7M5 12l7-7"/></svg>
      </button>
      <div class="topbar-title" id="topbar-title">Staff Hub</div>
      <button class="topbar-action hidden" id="topbar-add-btn" onclick="showAddEmployee()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button class="topbar-action hidden" id="topbar-leave-btn" onclick="showAddLeave()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </header>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <button class="nav-item active" id="nav-directory" onclick="showDirectory()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Staff</span>
      </button>
      <button class="nav-item" id="nav-leave" onclick="showLeaveOverview()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Leave</span>
      </button>
    </nav>

    <!-- PAGES -->
    <div class="pages-wrap">

      <!-- DIRECTORY -->
      <div id="page-directory" class="page active">
        <div class="search-bar">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search-input" placeholder="Search by name or position…" oninput="filterEmployees()" />
          <button class="search-clear hidden" id="search-clear" onclick="clearSearch()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="stats-strip">
          <div class="stat-pill"><span class="stat-num" id="stat-total">—</span><span class="stat-label">Total staff</span></div>
          <div class="stat-pill"><span class="stat-num" id="stat-probation">—</span><span class="stat-label">On probation</span></div>
          <div class="stat-pill"><span class="stat-num" id="stat-new">—</span><span class="stat-label">Joined this month</span></div>
        </div>
        <div class="section-label" id="dir-section-label">All staff</div>
        <div class="employee-list" id="employee-list">
          <div class="list-loading">Loading…</div>
        </div>
        <div class="empty-state hidden" id="empty-state">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <div>No results found</div>
        </div>
      </div>

      <!-- PROFILE -->
      <div id="page-profile" class="page hidden">
        <div id="profile-content"></div>
      </div>

      <!-- EMPLOYEE FORM -->
      <div id="page-emp-form" class="page hidden">
        <div class="form-container" id="emp-form-container"></div>
      </div>

      <!-- LEAVE OVERVIEW -->
      <div id="page-leave" class="page hidden">
        <div class="filter-row" id="leave-filter-row">
          <button class="f-pill active" data-filter="all" onclick="filterLeave('all')">All</button>
          <button class="f-pill" data-filter="today" onclick="filterLeave('today')">Today</button>
          <button class="f-pill" data-filter="week" onclick="filterLeave('week')">This week</button>
          <button class="f-pill" data-filter="month" onclick="filterLeave('month')">This month</button>
        </div>
        <div id="leave-list-container"></div>
      </div>

      <!-- CALENDAR -->
      <div id="page-calendar" class="page hidden">
        <div id="calendar-container"></div>
      </div>

      <!-- LEAVE FORM -->
      <div id="page-leave-form" class="page hidden">
        <div class="form-container" id="leave-form-container"></div>
      </div>

    </div>
  </div>

  <!-- CONFIRM DIALOG -->
  <div id="confirm-overlay" class="confirm-overlay hidden">
    <div class="confirm-sheet">
      <div class="confirm-title" id="confirm-title"></div>
      <div class="confirm-msg" id="confirm-msg"></div>
      <div class="confirm-actions">
        <button class="btn" onclick="closeConfirm()">Cancel</button>
        <button class="btn btn-danger" id="confirm-ok-btn">Confirm</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/app.js"></script>
  <script src="js/leave.js"></script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js");</script>
</body>
</html>
